site_name: Rognsundet – Dokumentasjon og faglig gjennomgang
site_description: Åpen, faglig gjennomgang av SalMar Farming AS' planer om ny akvakulturvirksomhet i Rognsundet, Alta kommune
site_url: https://egkristi.github.io/Rognsund_Oppdrett/
repo_url: https://github.com/egkristi/Rognsund_Oppdrett
repo_name: egkristi/Rognsund_Oppdrett
edit_uri: blob/main/

theme:
  name: material
  language: nb
  palette:
    primary: indigo
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list
  - footnotes

nav:
  - Hjem: index.md
  - Hoveddokumentasjon: Salmar_2026/README.md
  - Plan-sammenstilling: Salmar_2026/PLAN-SAMMENSTILLING.md
  - Underlagsdokumenter:
    - Varsel om oppstart: Salmar_2026/underlag_konvertert/Varsel om oppstart av  detaljregulering for akvakultur i Rognsund -_ - [www.alta.kommune.no].md
    - Kunngjøring: Salmar_2026/underlag_konvertert/Kunngjøring_ Rognsund akvakultur - Ramboll - [www.ramboll.com].md
    - Planinitiativ: Salmar_2026/underlag_konvertert/Vedlegg 1 - Planinitiativ.md
    - Oppstartsmøtereferat: Salmar_2026/underlag_konvertert/Vedlegg 2 - Oppstartsmøtereferat.md
    - Planprogram: Salmar_2026/underlag_konvertert/Vedlegg 3 - Planprogram.md
    - Personvernerklæring: Salmar_2026/underlag_konvertert/Vedlegg 4 - Personvernerklæring.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/egkristi/Rognsund_Oppdrett

copyright: >
  Dette prosjektet er fritt tilgjengelig for alle som ønsker å bruke dokumentasjonen i arbeidet med å bevare Rognsundet.
